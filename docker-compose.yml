version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: linksphere-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: linksphere
    volumes:
      - linksphere_mongo_data:/data/db

volumes:
  linksphere_mongo_data:
